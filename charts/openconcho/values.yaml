replicaCount: 1

image:
  repository: ghcr.io/offendingcommit/openconcho-web
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: false
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 101
  runAsGroup: 101
  fsGroup: 101
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: [ALL]

tmpfsMounts:
  - mountPath: /var/cache/nginx
  - mountPath: /var/run
  - mountPath: /tmp

service:
  type: ClusterIP
  port: 80
  containerPort: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: openconcho.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

honcho:
  defaultUrl: ""
  upstreamAllowlist: ""

resources:
  requests:
    cpu: 50m
    memory: 32Mi
  limits:
    memory: 128Mi

livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

podDisruptionBudget:
  enabled: false
  minAvailable: 1

networkPolicy:
  enabled: false

topologySpreadConstraints: []
nodeSelector: {}
tolerations: []
affinity: {}
